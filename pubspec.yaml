name: habit_app
description: "Daily health habits and medicine reminder. Free, offline-first, built for Indonesian TB patients."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_local_notifications: ^17.2.4
  android_alarm_manager_plus: ^5.0.0
  go_router: ^14.6.2
  pdf: ^3.11.1
  printing: ^5.13.2
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/home_background.webp
    - assets/home_sun.webp
    - assets/home_foreground.webp
    - assets/med_pill_mascot.webp
    - assets/med_reminder_bg.webp
    - assets/water_drop_mascot.webp
    - assets/star_mascot.webp
    - assets/flame_mascot.webp
    - assets/moon_mascot.webp
